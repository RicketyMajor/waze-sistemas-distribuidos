# --------------------------------------------------------------------------
# Docker Compose: Definición de Servicios
# --------------------------------------------------------------------------
services:
  # --------------------------------------------------------------------------
  # Servicio 1: Base de Datos (PostgreSQL con PostGIS)
  # --------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.3
    container_name: waze_postgres
    restart: always
    environment:
      - POSTGRES_USER=waze_user
      - POSTGRES_PASSWORD=waze_password
      - POSTGRES_DB=waze_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waze_user -d waze_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Servicio 2: Panel de Administración SQL (pgAdmin)
  # --------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: waze_admin_sql
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # --------------------------------------------------------------------------
  # Servicio 3: Caché en Memoria (Redis)
  # --------------------------------------------------------------------------
  cache:
    image: redis:7.0
    container_name: waze_cache
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "2mb", "--maxmemory-policy", "allkeys-lfu"]

  # --------------------------------------------------------------------------
  # Servicio 4: Aplicación Principal (Generador de Tráfico)
  # --------------------------------------------------------------------------
  traffic-app:
    build: .
    container_name: waze_traffic_generator
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - ./shared_data:/app/shared_data
      - ./results:/app/results
    environment:
      - DB_HOST=db
      - DB_USER=waze_user
      - DB_PASS=waze_password
      - DB_NAME=waze_db
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200

  # --------------------------------------------------------------------------
  # Servicio 5: Procesador de Big Data (Apache Pig)
  # --------------------------------------------------------------------------
  pig-processor:
    build:
      context: .
      dockerfile: Dockerfile.pig
    container_name: waze_pig_processor
    restart: always
    volumes:
      - ./shared_data:/app/shared_data
      - ./processing:/app/processing
    depends_on:
      - db
      - cache
    environment:
      - DB_HOST=db
      - REDIS_HOST=cache
    command: ["tail", "-f", "/dev/null"]

  # --------------------------------------------------------------------------
  # Servicio 6: Motor de Búsqueda y Analítica (Elasticsearch)
  # --------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: waze_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Desactivado temporalmente para agilizar el desarrollo interno
      - "ES_JAVA_OPTS=-Xms512m -Xmx768m" # Limitamos RAM para que no mate el contenedor local
    ports:
      - "9200:9200"
    volumes:
      - ./es_data:/usr/share/elasticsearch/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Servicio 7: Plataforma de Visualización (Kibana)
  # --------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: waze_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always